<!DOCTYPE html>
<html>
<head>
  <title>CyberRise Admin Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
      font-size: 14px;
    }

    .logout {
      background: red;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🔐 CyberRise Admin Dashboard</h1>

  <button class="logout" onclick="logout()">Logout</button>

  <!-- CREATE CERTIFICATE -->
  <div class="card">
    <h3>Create Certificate</h3>

    <input id="name" placeholder="Student Name">

    <button onclick="createCert()">Generate Certificate</button>

    <p id="status"></p>
  </div>

  <!-- CERT LIST -->
  <div class="card">
    <h3>Issued Certificates</h3>

    <button onclick="loadCertificates()">Refresh</button>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
        </tr>
      </thead>
      <tbody id="certTable"></tbody>
    </table>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    getDocs,
    collection
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  import {
    getAuth,
    onAuthStateChanged,
    signOut
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "cyberrise-certificates.firebaseapp.com",
    projectId: "cyberrise-certificates",
    storageBucket: "cyberrise-certificates.appspot.com",
    messagingSenderId: "358741421806",
    appId: "1:358741421806:web:5c9105e3ebc85895780dff"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // 🔐 PROTECT PAGE
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "login.html";
    }
  });

  // 🚪 LOGOUT
  window.logout = async function () {
    await signOut(auth);
    window.location.href = "login.html";
  };

  // 🧾 CREATE CERTIFICATE
  window.createCert = async function () {

    const name = document.getElementById("name").value.trim();
    const status = document.getElementById("status");

    if (!name) {
      alert("Enter student name");
      return;
    }

    const counterRef = doc(db, "meta", "counter");
    const counterSnap = await getDoc(counterRef);

    let lastId = counterSnap.exists() ? counterSnap.data().lastId : 0;

    const newId = lastId + 1;
    const certId = "CR-2026-" + String(newId).padStart(3, "0");

    const url = "https://cyberrise-institute.github.io/cyberrise-certificate-verifier/?id=" + certId;

    await setDoc(doc(db, "certificates", certId), {
      name: name,
      status: "valid",
      verifyUrl: url
    });

    await setDoc(counterRef, {
      lastId: newId
    });

    status.innerText = "✅ Created: " + certId;

    loadCertificates();
  };

  // 📋 LOAD CERTIFICATES
  window.loadCertificates = async function () {

    const table = document.getElementById("certTable");
    table.innerHTML = "";

    const snap = await getDocs(collection(db, "certificates"));

    snap.forEach(docSnap => {
      const data = docSnap.data();

      table.innerHTML += `
        <tr>
          <td>${docSnap.id}</td>
          <td>${data.name}</td>
        </tr>
      `;
    });
  };

  loadCertificates();
</script>

</body>
</html>
