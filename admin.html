<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CyberRise Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      color: #000;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .success {
      color: green;
      margin-top: 10px;
    }
  </style>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>

<body>

  <h1>🔐 CyberRise Admin Dashboard</h1>

  <div class="card">
    <h3>Add Certificate</h3>

    <input id="id" placeholder="Certificate ID (e.g. CRI-002)">
    <input id="name" placeholder="Student Name">
    <input id="course" value="CyberRise 30-day Cybersecurity Career Blueprint">
    <input id="date" placeholder="Date (e.g. July 2026)">

    <button onclick="addCert()">Add Certificate</button>

    <div id="msg"></div>
  </div>

  <script>
    // 🔥 Firebase Config (same as your main)
    const firebaseConfig = {
      apiKey: "AIzaSyCnAGp4IAiDdAe2cmvhmPYg3PfBc-7Acp4",
      authDomain: "cyberrise-certificates.firebaseapp.com",
      projectId: "cyberrise-certificates"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function addCert() {
      const id = document.getElementById("id").value.trim();
      const name = document.getElementById("name").value.trim();
      const course = document.getElementById("course").value.trim();
      const date = document.getElementById("date").value.trim();

      if (!id || !name || !course || !date) {
        document.getElementById("msg").innerHTML =
          "<p style='color:red;'>Fill all fields</p>";
        return;
      }

      db.collection("certificates").doc(id).set({
        name,
        course,
        date
      })
      .then(() => {
        document.getElementById("msg").innerHTML =
          "<p class='success'>✅ Certificate Added</p>";
      })
      .catch(err => {
        console.error(err);
        document.getElementById("msg").innerHTML =
          "<p style='color:red;'>Error adding certificate</p>";
      });
    }
  </script>

</body>
</html>
