<script>
async function generateCert() {
  const { jsPDF } = window.jspdf;

  const name = document.getElementById("name").value.trim();
  const id = document.getElementById("id").value.trim();

  if (!name || !id) {
    alert("Please enter both Name and Certificate ID");
    return;
  }

  const url = "https://cyberrise-institute.github.io/cyberrise-certificate-verifier/?id=" + encodeURIComponent(id);

  // Create QR
  const qrContainer = document.getElementById("qr");
  qrContainer.innerHTML = "";

  const qr = new QRCode(qrContainer, {
    text: url,
    width: 100,
    height: 100
  });

  // Wait for QR image to render safely
  setTimeout(() => {
    const qrImg = qrContainer.querySelector("img");

    if (!qrImg) {
      alert("QR generation failed. Try again.");
      return;
    }

    const doc = new jsPDF();

    // Title
    doc.setFontSize(22);
    doc.text("CyberRise Institute", 60, 20);

    doc.setFontSize(16);
    doc.text("Certificate of Completion", 60, 35);

    doc.setFontSize(12);
    doc.text("This certifies that", 85, 50);

    doc.setFontSize(18);
    doc.text(name, 80, 65);

    doc.setFontSize(12);
    doc.text("has completed the CyberRise 30-Day Cybersecurity Program", 20, 80);

    doc.text("Certificate ID: " + id, 20, 95);

    // QR Code
    doc.addImage(qrImg.src, "PNG", 160, 10, 40, 40);

    // Footer
    doc.text("Verify at: cyberrise-institute.github.io", 20, 130);

    doc.save(id + "-CyberRise-Certificate.pdf");

  }, 800);
}
</script>
