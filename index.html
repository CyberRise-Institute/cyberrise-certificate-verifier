<!DOCTYPE html>
<html>
<head>
  <title>Debug Certificate Verifier</title>
</head>

<body style="font-family:Arial; text-align:center; padding:40px; background:#0f172a; color:white;">

  <h2>🔍 Debug Certificate Verification</h2>

  <input id="certId" placeholder="Enter ID" style="padding:10px;">
  <br><br>

  <button onclick="verifyCertificate()">Verify</button>

  <div id="result" style="margin-top:20px;"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCnAGp4IAiDdAe2cmvhmPYg3PfBc-7Acp4",
    authDomain: "cyberrise-certificates.firebaseapp.com",
    projectId: "cyberrise-certificates"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.verifyCertificate = async function () {

    const id = document.getElementById("certId").value.trim();
    const result = document.getElementById("result");

    result.innerHTML = "Checking...";

    try {
      console.log("🔎 Searching ID:", id);

      const ref = doc(db, "certificates", id);
      const snap = await getDoc(ref);

      console.log("📦 Snapshot:", snap);
      console.log("✅ Exists:", snap.exists());

      if (snap.exists()) {
        const data = snap.data();

        result.innerHTML = `
          ✔ FOUND <br><br>
          Name: ${data.name}
        `;
      } else {
        result.innerHTML = "❌ NOT FOUND";
      }

    } catch (error) {
      console.error("🔥 ERROR:", error);
      result.innerHTML = "⚠ ERROR: " + error.message;
    }
  };
</script>

</body>
</html>
