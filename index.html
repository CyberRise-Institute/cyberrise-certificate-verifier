<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CyberRise Certificate Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🎨 CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- 🔥 Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <!-- 🔐 QR Code -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- 📄 PDF Generator -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

  <div class="container">
    <h1>🎓 CyberRise Certificate Verification</h1>
    <p>Enter your Certificate ID to verify authenticity</p>

    <!-- 🔍 Input -->
    <input 
      type="text" 
      id="certID" 
      placeholder="Enter Certificate ID (e.g. CRI-001)"
    >

    <!-- 🔘 Button -->
    <button onclick="verifyCert()">Verify Certificate</button>

    <!-- 📄 Result -->
    <div id="result"></div>

    <!-- 🔐 QR -->
    <div id="qrcode"></div>
  </div>

  <!-- 🚀 SCRIPT (VERY IMPORTANT - MUST BE LAST) -->
  <script src="script.js"></script>

</body>
</html>
