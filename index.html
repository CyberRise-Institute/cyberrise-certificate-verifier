<!DOCTYPE html>
<html>
<head>
  <title>CyberRise Certificate Verification</title>
</head>

<body style="font-family: Arial; text-align:center; padding:40px;">

  <h2>CyberRise Certificate Verification</h2>

  <input id="certId" placeholder="Enter Certificate ID" />
  <br><br>

  <button onclick="verifyCertificate()">Verify</button>

  <div id="result" style="margin-top:20px;"></div>

  <!-- 🔥 FIREBASE SCRIPT (PASTE HERE) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCnAGp4IAiDdAe2cmvhmPYg3PfBc-7Acp4",
      authDomain: "cyberrise-certificates.firebaseapp.com",
      projectId: "cyberrise-certificates",
      storageBucket: "cyberrise-certificates.appspot.com",
      messagingSenderId: "358741421806",
      appId: "1:358741421806:web:5c9105e3ebc85895780dff"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.verifyCertificate = async function () {
      const id = document.getElementById("certId").value.trim();
      const result = document.getElementById("result");

      if (!id) {
        result.innerHTML = "❌ Enter Certificate ID";
        return;
      }

      const ref = doc(db, "certificates", id);
      const snap = await getDoc(ref);

      if (snap.exists()) {
        const data = snap.data();

        result.innerHTML = `
          ✔ Certificate Verified <br><br>
          Name: ${data.name} <br>
          Course: ${data.course} <br>
          Date: ${data.date} <br>
          Status: VALID
        `;
      } else {
        result.innerHTML = "❌ Certificate Not Found";
      }
    };
  </script>

</body>
</html>
