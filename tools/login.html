<!DOCTYPE html>
<html>
<head>
  <title>CyberRise Admin Login</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      outline: none;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 10px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .error {
      margin-top: 10px;
      color: #f87171;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🔐 CyberRise Admin Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div id="msg" class="error"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  // 🔥 YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "cyberrise-certificates.firebaseapp.com",
    projectId: "cyberrise-certificates",
    storageBucket: "cyberrise-certificates.appspot.com",
    messagingSenderId: "358741421806",
    appId: "1:358741421806:web:5c9105e3ebc85895780dff"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.login = async function () {

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("msg");

    if (!email || !password) {
      msg.innerText = "Please fill in all fields";
      return;
    }

    try {
      await signInWithEmailAndPassword(auth, email, password);

      // ✅ Redirect to admin dashboard
      window.location.href = "admin.html";

    } catch (error) {
      msg.innerText = "❌ Invalid email or password";
    }
  };
</script>

</body>
</html>
